<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braelyn. | Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root, [data-theme="light"] {
            --bg-color: #FFFFFF; 
            --text-color: #111; 
            --accent-red: #8A1C1C; 
            --nav-bg: rgba(255, 255, 255, 0.95);
            --nav-border: rgba(0,0,0,0.05);
            --font-main: 'Montserrat', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #1A1A1A;
            --text-color: #E8E8E8;
            --accent-red: #6B1515;
            --nav-bg: rgba(26, 26, 26, 0.95);
            --nav-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent-red); border-radius: 20px;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.1s ease-out, background 0.3s, border 0.3s;
        }
        #cursor.active {
            width: 45px; height: 45px; background: transparent;
            border: 1px solid var(--accent-red);
        }
        #cursor.active::after, #cursor.active::before {
            content: ''; position: absolute; background: var(--accent-red);
        }
        #cursor.active::after { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #cursor.active::before { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-red); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            background: rgba(0,0,0,0.08); border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.08); }
        .nav-links a:hover::after { opacity: 1; }

        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { opacity: 0.7; }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        /* --- Projects Page Editorial Style --- */
        .page-header {
            padding: 14rem 6rem 8rem 6rem;
        }
        .page-title { 
            font-weight: 700; 
            font-size: clamp(3rem, 8vw, 10rem); 
            line-height: 0.95; 
            text-transform: uppercase; 
            letter-spacing: -3px;
        }
        .page-sub { 
            margin-top: 2rem; 
            font-weight: 400; 
            font-size: 12px; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
        }
        [data-theme="dark"] .page-sub { color: #555; }

        /* 项目列表 - 编辑风格 */
        .projects-list {
            padding: 0 6rem 20rem 6rem;
        }

        .project-item {
            margin-bottom: 12rem;
            position: relative;
        }
        .project-item:last-child { margin-bottom: 0; }

        .project-img-wrapper {
            width: 100%;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .project-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s;
        }

        /* 悬停：轻微缩放 */
        .project-item:hover .project-img-wrapper img {
            transform: scale(1.03);
            filter: brightness(0.92);
        }

        /* 项目信息 */
        .project-info {
            margin-top: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .project-name { 
            font-size: clamp(2rem, 4vw, 5rem); 
            font-weight: 700; 
            letter-spacing: -2px; 
            line-height: 1;
            text-transform: uppercase;
        }
        .project-meta {
            text-align: right;
        }
        .project-tag { 
            font-size: 11px; 
            color: var(--accent-red); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700; 
        }
        .project-year { 
            font-size: 11px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-top: 0.5rem;
        }
        [data-theme="dark"] .project-year { color: #555; }

        /* 全宽项目 */
        .project-item.full-width .project-img-wrapper {
            width: 100vw;
            margin-left: -6rem;
        }

        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .page-header { padding: 10rem 2rem 5rem 2rem; }
            .projects-list { padding: 0 2rem 12rem 2rem; }
            .project-item { margin-bottom: 8rem; }
            .project-info { flex-direction: column; align-items: flex-start; }
            .project-meta { text-align: left; margin-top: 1rem; }
            .project-item.full-width .project-img-wrapper { margin-left: -2rem; }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('.project-img-wrapper, a, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
    <script src="theme.js"></script>
