<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Braelyn 个人设计作品项目合集，包含品牌视觉、产品体验、编辑视觉、艺术指导与系统设计。">
    <title>Braelyn. | Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            transition: background 0.4s, color 0.4s;
        }

        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: #dc2626; border-radius: 50%;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.35s, height 0.35s, background 0.35s ease, opacity 0.35s ease;
        }
        #cursor.hover {
            width: 32px; height: 32px;
            background: transparent;
            border: 1px solid var(--text);
            opacity: 0.7;
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-red); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            background: rgba(0,0,0,0.08); border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.08); }
        .nav-links a:hover::after { opacity: 1; }

        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { opacity: 0.7; }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        /* --- Projects Page Editorial Style --- */
        .page-header {
            padding: 14rem 6rem 8rem 6rem;
        }
        .page-title { 
            font-weight: 700; 
            font-size: clamp(3rem, 8vw, 10rem); 
            line-height: 0.95; 
            text-transform: uppercase; 
            letter-spacing: -3px;
        }
        .page-sub { 
            margin-top: 2rem; 
            font-weight: 400; 
            font-size: 12px; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
        }
        [data-theme="dark"] .page-sub { color: #555; }

        /* 项目列表 - 4列网格，统一4:3封面 */
        .projects-list {
            padding: 0 6rem 20rem 6rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .project-item {
            position: relative;
        }

        .project-img-wrapper {
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 4px;
            background: var(--card-bg, #f0f0f0);
        }
        .project-img-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* 项目信息 */
        .project-info {
            margin-top: 1.2rem;
        }
        .project-name { 
            font-size: 1.1rem; 
            font-weight: 600; 
            letter-spacing: 0;
            line-height: 1.3;
        }
        .project-title-cn { display: inline; }
        .project-title-en { 
            display: inline; 
            font-weight: 400;
            color: #888;
            margin-left: 0.5rem;
            font-size: 0.85rem;
        }
        [data-theme="dark"] .project-title-en { color: #666; }
        .project-meta {
            margin-top: 0.3rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .project-tag { 
            font-size: 10px; 
            color: var(--accent-red); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 600; 
        }
        .project-year { 
            font-size: 10px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        [data-theme="dark"] .project-year { color: #555; }

        @media (max-width: 1024px) {
            .projects-list { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .page-header { padding: 10rem 2rem 5rem 2rem; }
            .projects-list { 
                padding: 0 2rem 12rem 2rem;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .project-info { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .projects-list { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body data-theme="light">

    <div id="cursor"></div>

    <nav>
        <div class="logo">Braelyn<span></span></div>
        <div class="nav-links">
            <a href="index.html"><span class="nav-label"><span class="nav-en">Home</span></span></a>
            <a href="projects.html"><span class="nav-label"><span class="nav-en">Projects</span></span></a>
            <a href="approach.html"><span class="nav-label"><span class="nav-en">Approach</span></span></a>
            <a href="about.html"><span class="nav-label"><span class="nav-en">About</span></span></a>
            <a href="contact.html"><span class="nav-label"><span class="nav-en">Contact</span></span></a>
            <button class="theme-toggle" id="themeToggle"></button>
        </div>
    </nav>

    <section class="page-header">
        <h1 class="page-title"><span class="title-en">Selected<br>Works</span><span class="title-cn">作品与系统</span></h1>
        <p class="page-sub">2021 — 2026</p>
    </section>

    <section class="projects-list"></section>
    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        const interactive = document.querySelectorAll('a, button, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
    </script>
    <script src="theme.js"></script>
    <script src="projects.js"></script>
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">Braelyn<span class="footer-dot"></span></span>
                <p class="footer-bio">设计是让构思得以实现</p>
            </div>
            <div class="footer-contact">
                <p class="footer-label">联系 / Contact</p>
                <a href="mailto:braelyn_hsu@foxmail.com">braelyn_hsu@foxmail.com</a>
            </div>
            <div class="footer-copy">
                <p>&copy; 2026 Braelyn. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
