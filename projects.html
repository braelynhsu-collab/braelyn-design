    <style>
        /* --- Projects Page Editorial Style --- */
        .page-header {
            padding: 14rem 6rem 8rem 6rem;
        }
        .page-title { 
            font-weight: 700; 
            font-size: clamp(3rem, 8vw, 10rem); 
            line-height: 0.95; 
            text-transform: uppercase; 
            letter-spacing: -3px;
        }
        .page-sub { 
            margin-top: 2rem; 
            font-weight: 400; 
            font-size: 12px; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
        }
        [data-theme="dark"] .page-sub { color: #555; }

        /* 项目列表 - 4列网格，统一4:3封面 */
        .projects-list {
            padding: 0 6rem 8rem 6rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .project-item {
            position: relative;
            transition: transform 0.55s var(--ease-out), opacity 0.55s var(--ease-out);
        }

        .project-item a {
            display: block;
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .project-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 4px;
            background: var(--card-bg, #f0f0f0);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: border-color 0.55s var(--ease-out), box-shadow 0.55s var(--ease-out), transform 0.55s var(--ease-out);
        }

        .project-img-wrapper::before,
        .project-img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .project-img-wrapper::before {
            background: linear-gradient(110deg, transparent 0%, transparent 40%, rgba(255, 54, 54, 0.24) 50%, transparent 60%, transparent 100%);
            opacity: 0;
            transform: translateX(-115%);
            transition: transform 0.85s var(--ease-out), opacity 0.35s ease;
        }

        .project-img-wrapper::after {
            box-shadow: inset 0 0 0 rgba(138, 28, 28, 0);
            transition: box-shadow 0.55s var(--ease-out);
        }
        .project-img-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.75s var(--ease-out), filter 0.55s ease;
        }

        .project-item:hover {
            transform: translateY(-8px);
        }

        .project-item:hover .project-img-wrapper {
            border-color: rgba(255, 84, 84, 0.42);
            box-shadow: 0 22px 70px rgba(138, 28, 28, 0.22);
        }

        .project-item:hover .project-img-wrapper::before {
            opacity: 1;
            transform: translateX(115%);
        }

        .project-item:hover .project-img-wrapper::after {
            box-shadow: inset 0 0 34px rgba(138, 28, 28, 0.22);
        }

        .project-item:hover .project-img-wrapper img {
            transform: scale(1.045);
            filter: saturate(1.08) contrast(1.03);
        }

        /* 项目信息 */
        .project-info {
            margin-top: 1.2rem;
            text-align: left;
            transition: transform 0.55s var(--ease-out);
        }

        .project-item:hover .project-info { transform: translateY(-4px); }
        .project-name { 
            font-size: 1.1rem; 
            font-weight: 600; 
            letter-spacing: 0;
            line-height: 1.3;
        }
        .project-title-cn { display: block; }
        .project-title-en { 
            display: block; 
            font-weight: 400;
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.1rem;
        }
        [data-theme="dark"] .project-title-en { color: #666; }
        .project-meta {
            margin-top: 0.3rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .project-tag { 
            font-size: 10px; 
            color: var(--accent-red); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 600; 
        }
        .project-year { 
            font-size: 10px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        [data-theme="dark"] .project-year { color: #555; }

        @media (max-width: 1024px) {
            .projects-list { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .page-header { padding: 10rem 2rem 5rem 2rem; }
            .projects-list { 
                padding: 0 2rem 7rem 2rem;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .project-info { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .projects-list { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="design-system.css?v=15">
</head>
<body data-theme="light">

    <div id="cursor"></div>

    <nav>
            <div class="logo">Braelyn<span></span></div>

                <a href="about.html"><span class="nav-label"><span class="nav-en">About</span></span></a>
                <a href="contact.html"><span class="nav-label"><span class="nav-en">Contact</span></span></a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"></button>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>

    <section class="page-header fade-section" style="max-width:none!important;margin:0!important;text-align:left!important;padding-left:96px!important;padding-top:224px!important;padding-bottom:128px!important;padding-right:96px!important">
        <h1 class="page-title"><span class="title-en">BRAND WORK</span><span class="title-cn">品牌与传播项目</span></h1>
        <p class="page-sub">Selected projects across brand identity, visual systems and integrated campaigns.</p>
    </section>

    <section class="projects-list fade-section" style="max-width:none!important;margin:0!important"></section>
    <script>
        const cursor = document.getElementById('cursor');
        let cursorX = 0, cursorY = 0;
        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });
        function tickCursor() {
            cursor.style.transform = 'translate(' + cursorX + 'px, ' + cursorY + 'px) translate(-50%, -50%)';
            requestAnimationFrame(tickCursor);
        }
        tickCursor();
        const interactive = document.querySelectorAll('a, button, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
    </script>
    <script src="theme.js"></script>
    <script src="projects.js"></script>
    <script>
        (function() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.08 });
            document.querySelectorAll('.fade-section').forEach(function(el) {
                observer.observe(el);
            });
        })();
    </script>
