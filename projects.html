<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Braelyn 个人设计作品项目合集，包含品牌视觉、产品体验、编辑视觉、艺术指导与系统设计。">
    <title>Braelyn. | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Projects Page Editorial Style --- */
        .page-header {
            padding: 14rem 6rem 8rem 6rem;
        }
        .page-title { 
            font-weight: 700; 
            font-size: clamp(3rem, 8vw, 10rem); 
            line-height: 0.95; 
            text-transform: uppercase; 
            letter-spacing: -3px;
        }
        .page-sub { 
            margin-top: 2rem; 
            font-weight: 400; 
            font-size: 12px; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
        }
        [data-theme="dark"] .page-sub { color: #555; }

        /* 项目列表 - 4列网格，统一4:3封面 */
        .projects-list {
            padding: 0 6rem 20rem 6rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .project-item {
            position: relative;
        }

        .project-img-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 4px;
            background: var(--card-bg, #f0f0f0);
        }
        .project-img-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* 项目信息 */
        .project-info {
            margin-top: 1.2rem;
            text-align: left;
        }
        .project-name { 
            font-size: 1.1rem; 
            font-weight: 600; 
            letter-spacing: 0;
            line-height: 1.3;
        }
        .project-title-cn { display: block; }
        .project-title-en { 
            display: block; 
            font-weight: 400;
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.1rem;
        }
        [data-theme="dark"] .project-title-en { color: #666; }
        .project-meta {
            margin-top: 0.3rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .project-tag { 
            font-size: 10px; 
            color: var(--accent-red); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 600; 
        }
        .project-year { 
            font-size: 10px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        [data-theme="dark"] .project-year { color: #555; }

        @media (max-width: 1024px) {
            .projects-list { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .page-header { padding: 10rem 2rem 5rem 2rem; }
            .projects-list { 
                padding: 0 2rem 12rem 2rem;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .project-info { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .projects-list { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="design-system.css?v=4">
</head>
<body data-theme="light">

    <div id="cursor"></div>

    <nav>
            <div class="logo">Braelyn<span></span></div>
            <div class="nav-links" id="navLinks">
                <a href="index.html"><span class="nav-label"><span class="nav-en">Home</span></span></a>
                <a href="projects.html"><span class="nav-label"><span class="nav-en">Projects</span></span></a>
                <a href="contact.html"><span class="nav-label"><span class="nav-en">Contact</span></span></a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle"></button>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>

    <section class="page-header" style="max-width:none!important;margin:0!important;text-align:left!important;padding-left:96px!important;padding-top:224px!important;padding-bottom:128px!important;padding-right:96px!important">
        <h1 class="page-title"><span class="title-en">BRAND WORK</span><span class="title-cn">品牌与传播项目</span></h1>
        <p class="page-sub">Selected projects across brand identity, visual systems and integrated campaigns.</p>
    </section>

    <section class="projects-list" style="max-width:none!important;margin:0!important"></section>
    <script>
        const cursor = document.getElementById('cursor');
        let cursorX = 0, cursorY = 0;
        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });
        function tickCursor() {
            cursor.style.transform = 'translate(' + cursorX + 'px, ' + cursorY + 'px) translate(-50%, -50%)';
            requestAnimationFrame(tickCursor);
        }
        tickCursor();
        const interactive = document.querySelectorAll('a, button, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
    </script>
    <script src="theme.js"></script>
    <script src="projects.js"></script>
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">Braelyn<span class="footer-dot"></span></span>
                <p class="footer-bio">设计是让构思得以实现</p>
            </div>
            <div class="footer-contact">
                <p class="footer-label">联系 / Contact</p>
                <a href="mailto:braelyn_hsu@foxmail.com">braelyn_hsu@foxmail.com</a>
            </div>
            <div class="footer-copy">
                <p>&copy; 2026 Braelyn. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
