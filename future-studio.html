<!DOCTYPE html>
<html lang="zh" data-theme="dark">

    <title>Braelyn. | Purajuvé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-system.css?v=16">
    
    <style>
        .hero {
            padding: 8rem 6rem 0 6rem;
        }
        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
        }
        .project-title {
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 10rem);
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
        .project-desc {
            margin-top: 3rem;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            max-width: 600px;
        }
        [data-theme="dark"] .project-desc { color: #555; }

        .hero-image {
            margin-top: 0;
            width: 100%;
            overflow: hidden;
        }
        .hero-image img {
            width: 100%;
            display: block;
        }

        .visuals {
            padding: 0 6rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .full-image {
            width: 100%;
            line-height: 0;
        }
        .full-image img {
            width: 100%;
            display: block;
        }

        .closing {
            padding: 12rem 6rem 20rem 6rem;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }
        .closing-text {
            font-size: clamp(1.5rem, 3vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .closing-year {
            margin-top: 2rem;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
        }
        [data-theme="dark"] .closing-year { color: #555; }

        .back-link {
            display: inline-block;
            margin-top: 4rem;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-red);
            text-decoration: none;
            transition: transform 0.4s;
        }
        .back-link:hover { transform: translateY(-5px); }

        /* 覆盖全局 hover 效果 - 项目详情页不需要图片放大 */
        }

        @media (max-width: 768px) {
            .hero { padding: 6rem 2rem 0 2rem; }
            .visuals { padding: 0 2rem; }
            .closing { padding: 6rem 2rem 10rem 2rem; }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        let cursorX = 0, cursorY = 0;
        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
        });
        function tickCursor() {
            cursor.style.transform = 'translate(' + cursorX + 'px, ' + cursorY + 'px) translate(-50%, -50%)';
            requestAnimationFrame(tickCursor);
        }
        tickCursor();

        const interactive = document.querySelectorAll('.project-img-wrapper, a, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
