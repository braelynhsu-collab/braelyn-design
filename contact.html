<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braelyn. | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root, [data-theme="light"] {
            --bg-color: #FFFFFF; 
            --text-color: #111; 
            --accent-red: #8A1C1C; 
            --nav-bg: rgba(255, 255, 255, 0.95);
            --nav-border: rgba(0,0,0,0.05);
            --font-main: 'Montserrat', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --text-color: #F7F7F5;
            --accent-red: #8A1C1C;
            --nav-bg: rgba(17, 17, 17, 0.95);
            --nav-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent-red); border-radius: 20px;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.1s ease-out, background 0.3s, border 0.3s;
        }
        #cursor.active {
            width: 45px; height: 45px; background: transparent;
            border: 1px solid var(--accent-red);
        }
        #cursor.active::after, #cursor.active::before {
            content: ''; position: absolute; background: var(--accent-red);
        }
        #cursor.active::after { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #cursor.active::before { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .nav-links a:hover { transform: translateY(-5px); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            background: rgba(0,0,0,0.08); border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.08); }
        .nav-links a:hover::after { opacity: 1; }

        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { transform: translateY(-5px); }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        /* --- Contact Page Editorial Style --- */
        .contact-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 6rem;
        }
        .hero-title { 
            font-weight: 700; 
            font-size: clamp(3rem, 8vw, 10rem); 
            line-height: 0.95; 
            text-transform: uppercase; 
            letter-spacing: -3px;
        }
        .hero-sub { 
            margin-top: 2rem; 
            font-size: 12px; 
            letter-spacing: 3px; 
            color: #888; 
            text-transform: uppercase; 
        }
        [data-theme="dark"] .hero-sub { color: #555; }

        .contact-section {
            padding: 0 6rem 20rem 6rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12rem;
            margin-top: 12rem;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-red);
            margin-bottom: 2rem;
        }

        .contact-value {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .contact-link {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s;
        }
        .contact-link:hover { color: var(--accent-red); }

        .availability {
            margin-top: 12rem;
            text-align: center;
        }

        .availability-text {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .contact-hero { padding: 0 2rem; }
            .contact-section { padding: 0 2rem 12rem 2rem; }
            .contact-grid { grid-template-columns: 1fr; gap: 6rem; margin-top: 8rem; }
            .availability { margin-top: 8rem; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="cursor"></div>

    <nav>
        <div class="logo">Braelyn<span></span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="approach.html">Approach</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button class="theme-toggle" id="themeToggle">DARK</button>
        </div>
    </nav>

    <section class="contact-hero">
        <h1 class="hero-title">Let's<br>Work<br>Together</h1>
        <p class="hero-sub">Currently available for select projects</p>
    </section>

    <section class="contact-section">
        <div class="contact-grid">
            <div>
                <div class="contact-label">Email</div>
                <a href="mailto:hello@braelyn.com" class="contact-link">
                    <div class="contact-value">hello@braelyn.com</div>
                </a>
            </div>
            <div>
                <div class="contact-label">Social</div>
                <a href="#" class="contact-link">
                    <div class="contact-value">LinkedIn</div>
                </a>
                <div style="margin-top: 2rem;">
                    <a href="#" class="contact-link">
                        <div class="contact-value">WeChat</div>
                    </a>
                </div>
            </div>
        </div>

        <div class="availability">
            <div class="contact-label">Availability</div>
            <p class="availability-text">
                I'm currently available for new projects starting Q2 2026. 
                If you have a project in mind, let's start a conversation.
            </p>
        </div>
    </section>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('a, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
    <script src="theme.js"></script>
</body>
</html>
