<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braelyn. | Proya</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-system.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            transition: background 0.4s, color 0.4s;
        }

        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: #dc2626; border-radius: 50%;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.35s, height 0.35s, background 0.35s ease, opacity 0.35s ease;
        }
        #cursor.hover {
            width: 36px; height: 36px;
            background: transparent;
            border: 1px solid var(--text);
            opacity: 0.8;
            animation: cursor-breathe 2s ease-in-out infinite;
        }
        #cursor.hover::after {
            content: '+';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 300;
            color: var(--text);
            line-height: 1;
        }
        @keyframes cursor-breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.5; }
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--nav-border);
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .nav-links a:hover { transform: translateY(-5px); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            background: rgba(0,0,0,0.08); border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.08); }
        .nav-links a:hover::after { opacity: 1; }

        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { transform: translateY(-5px); }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        .hero {
            padding: 8rem 6rem 0 6rem;
        }
        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
        }
        .project-title {
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 10rem);
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -3px;
        }
        .project-desc {
            margin-top: 3rem;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            max-width: 600px;
        }
        [data-theme="dark"] .project-desc { color: #555; }

        .hero-image {
            margin-top: 0;
            width: 100%;
            overflow: hidden;
        }
        .hero-image img {
            width: 100%;
            display: block;
        }

        .visuals {
            padding: 0 6rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .full-image {
            width: 100%;
            line-height: 0;
        }
        .full-image img {
            width: 100%;
            display: block;
        }
        .full-video {
            width: 100%;
            line-height: 0;
        }
        .full-video video {
            width: 100%;
            display: block;
        }

        .closing {
            padding: 12rem 6rem 20rem 6rem;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }
        .closing-text {
            font-size: clamp(1.5rem, 3vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .closing-year {
            margin-top: 2rem;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
        }
        [data-theme="dark"] .closing-year { color: #555; }

        .back-link {
            display: inline-block;
            margin-top: 4rem;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-red);
            text-decoration: none;
            transition: transform 0.4s;
        }
        .back-link:hover { transform: translateY(-5px); }

        /* 覆盖全局 hover 效果 - 项目详情页不需要图片放大 */
        .full-image:hover img,
        .hero-image:hover img,
        .img-wrapper:hover img {
            transform: none !important;
            filter: none !important;
        }

        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .hero { padding: 6rem 2rem 0 2rem; }
            .visuals { padding: 0 2rem; }
            .closing { padding: 8rem 2rem 12rem 2rem; }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('.project-img-wrapper, a, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
