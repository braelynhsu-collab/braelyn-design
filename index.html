<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braelyn. | The Perfect Stack</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 设计系统：白天模式 (默认) --- */
        :root, [data-theme="light"] {
            --bg-color: #F7F7F5; 
            --text-color: #111; 
            --accent-red: #E2211C; 
            --nav-bg: rgba(247, 247, 245, 0.95);
            --nav-border: rgba(0,0,0,0.03);
            --nav-shadow: rgba(0,0,0,0.08);
            --hero-sub: #888;
            --img-bg: transparent;
            --img-hover-brightness: brightness(0.5);
            --card-shadow: rgba(0,0,0,0.12);
            --footer-border: rgba(0,0,0,0.06);
            --font-main: 'Montserrat', sans-serif;
        }

        /* --- 设计系统：夜间模式 (五彩斑斓的黑) --- */
        [data-theme="dark"] {
            --bg-color: #0A0A0A; 
            --text-color: #C8C8C8; 
            --accent-red: #6B1515; 
            --nav-bg: rgba(8, 8, 8, 0.95);
            --nav-border: rgba(255,255,255,0.08);
            --nav-shadow: rgba(255,255,255,0.1);
            --hero-sub: #666;
            --img-bg: #1A1A1A;
            --img-hover-brightness: brightness(0.5);
            --card-shadow: rgba(0,0,0,0.6);
            --footer-border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* --- 1. V12 磁吸准星指针 --- */
        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent-red); border-radius: 20px;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.1s ease-out, background 0.3s, border 0.3s;
        }
        #cursor.active {
            width: 45px; height: 45px; background: transparent;
            border: 1px solid var(--accent-red);
        }
        #cursor.active::after, #cursor.active::before {
            content: ''; position: absolute; background: var(--accent-red);
        }
        #cursor.active::after { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #cursor.active::before { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* --- 2. 导航栏 --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            transition: background-color 0.5s, border-color 0.5s;
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            display: inline-block;
            padding: 20px 0;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-red); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
            background: rgba(0,0,0,0.08);
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.2); }
        .nav-links a:hover::after { opacity: 0.5; }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { opacity: 0.7; }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        /* --- 3. 首屏 --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 4rem;
        }
        .hero-title { font-weight: 650; font-size: clamp(2.6rem, 5.8vw, 7rem); line-height: 1.04; letter-spacing: -0.045em; text-transform: uppercase; }
        .hero-sub { margin-top: 1.6rem; font-weight: 400; font-size: 12px; letter-spacing: 3px; color: var(--hero-sub); text-transform: uppercase; }

        /* --- 4. 项目展示：精致错落叠加 --- */
        .works { padding: 1rem 6rem 18rem 6rem; position: relative; }
        .works::before {
            content: 'Selected Works';
            display: block;
            margin-bottom: 4rem;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.4px;
            color: var(--accent-red);
            text-transform: uppercase;
        }
        .works a { display: block; position: relative; color: inherit; text-decoration: none; }
        .project-card { position: relative; transition: z-index 0.3s; }

        .proj-1 { width: 52%; margin-left: 4%; z-index: 12; }
        .proj-2 { width: 34%; margin-left: auto; margin-right: 8%; margin-top: -30vh; z-index: 24; }
        .proj-3 { width: 76%; margin: -7vh 0 0 16%; z-index: 18; }
        .proj-4 { width: 40%; margin-top: -13vh; margin-left: 2%; z-index: 30; }
        .proj-5 { width: 36%; margin-left: auto; margin-right: 4%; margin-top: -27vh; z-index: 36; }
        .proj-6 { width: 60%; margin-top: -8vh; margin-left: 24%; z-index: 28; }

        .proj-1 .img-wrapper { transform: rotate(-0.6deg); }
        .proj-2 .img-wrapper { transform: rotate(0.8deg); }
        .proj-3 .img-wrapper { transform: rotate(-0.35deg); }
        .proj-4 .img-wrapper { transform: rotate(0.7deg); }
        .proj-5 .img-wrapper { transform: rotate(-0.8deg); }
        .proj-6 .img-wrapper { transform: rotate(0.35deg); }

        .img-wrapper { 
            width: 100%; overflow: hidden; background: var(--img-bg); 
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.8s ease, border-color 0.5s;
            position: relative;
        }
        [data-theme="dark"] .img-wrapper { border-color: rgba(255,255,255,0.06); }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s; }

        .project-card::after {
            content: '';
            position: absolute;
            inset: auto -1.2rem -1.2rem auto;
            width: 28%;
            height: 28%;
            border-right: 1px solid rgba(0,0,0,0.08);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        [data-theme="dark"] .project-card::after { border-color: rgba(255,255,255,0.1); }
        
        .project-card:hover { z-index: 100; }
        .project-card:hover .img-wrapper { transform: translateY(-8px) rotate(0deg) scale(1.025); box-shadow: 0 26px 60px var(--card-shadow); }
        .project-card:hover img { filter: var(--img-hover-brightness); transform: scale(1.06); }
        .project-card:hover::after { opacity: 1; }

        .proj-info { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; transition: 0.5s; pointer-events: none;
        }
        .project-card:hover .proj-info { opacity: 1; }
        .proj-title { font-size: clamp(1.5rem, 3vw, 2.4rem); font-weight: 700; color: #fff; letter-spacing: -1px; }
        .proj-tag { margin-top: 0.5rem; font-size: 11px; color: var(--accent-red); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        /* --- 5. 底部 --- */
        .footer {
            padding: 12rem 4rem; border-top: 1px solid var(--footer-border);
            display: flex; justify-content: center; align-items: center;
        }
        .footer-title {
            font-size: clamp(3rem, 10vw, 12rem); font-weight: 800; letter-spacing: -4px;
            position: relative; line-height: 1;
        }
        .flower-asterisk {
            position: absolute; top: -0.1em; right: -0.6em;
            width: 0.5em; height: 0.5em; fill: var(--accent-red);
            animation: rotateFlower 18s linear infinite;
        }
        @keyframes rotateFlower { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .hero { height: 86vh; padding: 0 2rem; }
            .works { padding: 0 2rem 10rem 2rem; }
            .works::before { margin-bottom: 3rem; }
            .proj-1, .proj-2, .proj-3, .proj-4, .proj-5, .proj-6 {
                width: 100%;
                margin: 0 0 3rem 0;
            }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('.img-wrapper, a, .footer-title, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
