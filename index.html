<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braelyn. | The Perfect Stack</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 设计系统：白天模式 (默认) --- */
        :root, [data-theme="light"] {
            --bg-color: #F7F7F5; 
            --text-color: #111; 
            --accent-red: #E2211C; 
            --nav-bg: rgba(247, 247, 245, 0.95);
            --nav-border: rgba(0,0,0,0.03);
            --nav-shadow: rgba(0,0,0,0.08);
            --hero-sub: #888;
            --img-bg: transparent;
            --img-hover-brightness: brightness(0.5);
            --card-shadow: rgba(0,0,0,0.12);
            --footer-border: rgba(0,0,0,0.06);
            --font-main: 'Montserrat', sans-serif;
        }

        /* --- 设计系统：夜间模式 (五彩斑斓的黑) --- */
        [data-theme="dark"] {
            --bg-color: #0A0A0A; 
            --text-color: #C8C8C8; 
            --accent-red: #6B1515; 
            --nav-bg: rgba(8, 8, 8, 0.95);
            --nav-border: rgba(255,255,255,0.08);
            --nav-shadow: rgba(255,255,255,0.1);
            --hero-sub: #666;
            --img-bg: #1A1A1A;
            --img-hover-brightness: brightness(0.5);
            --card-shadow: rgba(0,0,0,0.6);
            --footer-border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* --- 1. V12 磁吸准星指针 --- */
        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent-red); border-radius: 20px;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.1s ease-out, background 0.3s, border 0.3s;
        }
        #cursor.active {
            width: 45px; height: 45px; background: transparent;
            border: 1px solid var(--accent-red);
        }
        #cursor.active::after, #cursor.active::before {
            content: ''; position: absolute; background: var(--accent-red);
        }
        #cursor.active::after { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #cursor.active::before { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* --- 2. 导航栏 --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            transition: background-color 0.5s, border-color 0.5s;
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            display: inline-block;
            padding: 20px 0;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-red); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
            background: rgba(0,0,0,0.08);
        }
        [data-theme="dark"] .nav-links a::after { background: rgba(255,255,255,0.2); }
        .nav-links a:hover::after { opacity: 0.5; }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none; border: none; color: inherit;
            padding: 8px; cursor: none;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { opacity: 0.7; }
        .theme-toggle svg { transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .theme-toggle:hover svg { transform: rotate(30deg); }

        /* --- 3. 首屏 --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .hero-title { font-weight: 600; font-size: clamp(2.2rem, 5vw, 6rem); line-height: 1.1; text-transform: uppercase; }
        .hero-sub { margin-top: 1.5rem; font-weight: 400; font-size: 12px; letter-spacing: 3px; color: var(--hero-sub); text-transform: uppercase; }

        /* --- 4. 编辑风格项目列表 --- */
        .works { padding: 8rem 6rem 20rem 6rem; }
        
        .project-list-item {
            display: block;
            padding: 2.5rem 0;
            border-bottom: 1px solid var(--nav-border);
            text-decoration: none;
            color: inherit;
            transition: padding 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .project-list-item:first-child { border-top: 1px solid var(--nav-border); }
        
        .project-list-item:hover { padding-left: 1.5rem; }

        .project-list-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-name { 
            font-size: clamp(1.8rem, 4vw, 3.5rem); 
            font-weight: 700; 
            letter-spacing: -1px; 
            text-transform: uppercase;
            line-height: 1.1;
        }
        .project-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .project-tag { 
            font-size: 11px; 
            color: var(--accent-red); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700; 
            margin-bottom: 0.5rem;
        }
        .project-year { 
            font-size: 11px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        [data-theme="dark"] .project-year { color: #666; }

        .project-hover-img {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            overflow: hidden;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
        }
        .project-list-item:hover .project-hover-img {
            width: 240px;
            height: 160px;
            opacity: 1;
        }
        .project-hover-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .project-hover-img { display: none; }
            .project-list-item:hover { padding-left: 0; }
        }

        /* --- 5. 底部 --- */
        .footer {
            padding: 12rem 4rem; border-top: 1px solid var(--footer-border);
            display: flex; justify-content: center; align-items: center;
        }
        .footer-title {
            font-size: clamp(3rem, 10vw, 12rem); font-weight: 800; letter-spacing: -4px;
            position: relative; line-height: 1;
        }
        .flower-asterisk {
            position: absolute; top: -0.1em; right: -0.6em;
            width: 0.5em; height: 0.5em; fill: var(--accent-red);
            animation: rotateFlower 18s linear infinite;
        }
        @keyframes rotateFlower { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .works { padding: 0 2rem 10rem 2rem; }
            .proj-1, .proj-3, .proj-4, .proj-6 { width: 90%; }
            .proj-2, .proj-5 { width: 70%; }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('.img-wrapper, a, .footer-title, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
    </script>
