<head>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 设计系统：白天模式 (默认) --- */
        :root, [data-theme="light"] {
            --bg-color: #F7F7F5; 
            --text-color: #111; 
            --accent-red: #E2211C; 
            --nav-bg: rgba(247, 247, 245, 0.95);
            --nav-border: rgba(0,0,0,0.03);
            --nav-shadow: rgba(0,0,0,0.08);
            --hero-sub: #888;
            --img-bg: transparent;
            --img-hover-brightness: brightness(0.5);
            --card-shadow: rgba(0,0,0,0.12);
            --footer-border: rgba(0,0,0,0.06);
            --font-main: 'Montserrat', sans-serif;
        }

        /* --- 设计系统：夜间模式 --- */
        [data-theme="dark"] {
            --bg-color: #111111;
            --text-color: #F7F7F5;
            --accent-red: #E2211C;
            --nav-bg: rgba(17, 17, 17, 0.95);
            --nav-border: rgba(255, 255, 255, 0.05);
            --nav-shadow: rgba(255, 255, 255, 0.08);
            --hero-sub: #555;
            --img-bg: #222;
            --img-hover-brightness: brightness(0.4);
            --card-shadow: rgba(0,0,0,0.5);
            --footer-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* --- 1. V12 磁吸准星指针 --- */
        #cursor {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--accent-red); border-radius: 20px;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, transform 0.1s ease-out, background 0.3s, border 0.3s;
        }
        #cursor.active {
            width: 45px; height: 45px; background: transparent;
            border: 1px solid var(--accent-red);
        }
        #cursor.active::after, #cursor.active::before {
            content: ''; position: absolute; background: var(--accent-red);
        }
        #cursor.active::after { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #cursor.active::before { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* --- 2. 导航栏 --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            transition: background-color 0.5s, border-color 0.5s;
        }
        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: baseline; letter-spacing: -1px; }
        .logo span { width: 7px; height: 7px; background: var(--accent-red); border-radius: 50%; margin-left: 3px; }

        .nav-links { display: flex; gap: 3rem; align-items: center; }
        .nav-links a { 
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            text-decoration: none; color: inherit; position: relative;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .nav-links a:hover { transform: translateY(-5px); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -18px; left: 10%; width: 80%; height: 2px;
            background: var(--nav-shadow); border-radius: 50%; filter: blur(3px);
            opacity: 0; transition: opacity 0.4s;
        }
        .nav-links a:hover::after { opacity: 1; }

        /* 主题切换按钮 */
        .theme-toggle {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            background: none; border: 1px solid var(--text-color); color: inherit;
            padding: 8px 16px; cursor: none;
            transition: all 0.3s;
        }
        .theme-toggle:hover { background: var(--accent-red); border-color: var(--accent-red); color: #fff; transform: translateY(-5px); }

        /* --- 3. 首屏 --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .hero-title { font-weight: 600; font-size: clamp(2.2rem, 5vw, 6rem); line-height: 1.1; text-transform: uppercase; }
        .hero-sub { margin-top: 1.5rem; font-weight: 400; font-size: 12px; letter-spacing: 3px; color: var(--hero-sub); text-transform: uppercase; }

        /* --- 4. 连续叠压排版 --- */
        .works { padding: 0 6rem 15rem 6rem; position: relative; }
        .project-card { position: relative; transition: z-index 0.3s; }
        
        .proj-1 { width: 55%; margin-left: 0; z-index: 10; }
        .proj-2 { width: 35%; margin-left: auto; margin-top: -35vh; z-index: 20; }
        .proj-3 { width: 80%; margin: -15vh auto 0 auto; z-index: 15; }
        .proj-4 { width: 45%; margin-top: -20vh; margin-left: 2%; z-index: 25; }
        .proj-5 { width: 38%; margin-left: auto; margin-right: 5%; margin-top: -30vh; z-index: 30; }
        .proj-6 { width: 55%; margin-top: -25vh; margin-left: 10%; z-index: 35; }

        .img-wrapper { 
            width: 100%; overflow: hidden; background: var(--img-bg); 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.8s ease;
            position: relative;
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s; }
        
        .project-card:hover { z-index: 100; }
        .project-card:hover .img-wrapper { transform: translateY(-10px) scale(1.04); box-shadow: 0 30px 60px var(--card-shadow); }
        .project-card:hover img { filter: var(--img-hover-brightness); transform: scale(1.08); }

        .proj-info { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; transition: 0.5s; pointer-events: none;
        }
        .project-card:hover .proj-info { opacity: 1; }
        .proj-title { font-size: 2.2rem; font-weight: 700; color: #fff; letter-spacing: -1px; }
        .proj-tag { font-size: 11px; color: var(--accent-red); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        /* --- 5. 底部 --- */
        .footer {
            padding: 12rem 4rem; border-top: 1px solid var(--footer-border);
            display: flex; justify-content: center; align-items: center;
        }
        .footer-title {
            font-size: clamp(3rem, 10vw, 12rem); font-weight: 800; letter-spacing: -4px;
            position: relative; line-height: 1;
        }
        .flower-asterisk {
            position: absolute; top: -0.1em; right: -0.6em;
            width: 0.5em; height: 0.5em; fill: var(--accent-red);
            animation: rotateFlower 18s linear infinite;
        }
        @keyframes rotateFlower { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 1.5rem 2rem; }
            .nav-links { gap: 1.5rem; }
            .works { padding: 0 2rem 10rem 2rem; }
            .proj-1, .proj-3, .proj-4, .proj-6 { width: 90%; }
            .proj-2, .proj-5 { width: 70%; }
        }
    </style>
</head>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactive = document.querySelectorAll('.img-wrapper, a, .footer-title, .theme-toggle');
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        // 主题切换功能
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // 根据时间自动设置主题 (6:00-18:00 为白天)
        function getTimeBasedTheme() {
            const hour = new Date().getHours();
            return (hour >= 6 && hour < 18) ? 'light' : 'dark';
        }

        // 获取存储的主题或使用时间判断
        function getTheme() {
            const savedTheme = localStorage.getItem('braelyn-theme');
            return savedTheme || getTimeBasedTheme();
        }

        // 设置主题
        function setTheme(theme) {
            body.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? 'LIGHT' : 'DARK';
            localStorage.setItem('braelyn-theme', theme);
        }

        // 切换主题
        function toggleTheme() {
            const current = body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        themeToggle.addEventListener('click', toggleTheme);

        // 初始化主题
        setTheme(getTheme());
    </script>
